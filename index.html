function getSessData(phase, week, dow, group) {

else if(phase===2) result = p2Session(week,dow,is90);
else if(phase===3) result = p3Session(week,dow,is90);
else if(phase===4) result = p4Session(week,dow,is90);
else result = null;
if(!result) return {title:L("Descanso Activo","Active Rest"),blocks:[],el:L("Mantenimiento","Maintenance"),ri:"",pct:70,pc:PC[5]||"#4a4a1a",type:"rest"};

return result;
}

function marcarEntrenoPro(dia) {
  if (!ST.proUser) return;

function saveProAth(existId){
const gv=id=>{const e=document.getElementById(id);return e?e.value:"";};
const name=gv("pa-name");if(!name.trim()){alert("Ingresa el nombre");return;}
const pin=gv("pa-pin");if(pin.length!==4){alert("PIN debe ser 4 dígitos");return;}
const data={name:name.trim(),weight:parseFloat(gv("pa-wt"))||0,pin,category:gv("pa-cat"),proPhase:parseInt(gv("pa-phase"))||1,proWeek:1,wins:parseInt(gv("pa-w"))||0,losses:parseInt(gv("pa-l"))||0,draws:parseInt(gv("pa-d"))||0,notes:gv("pa-notes"),status:"Activo",isPro:true};
if(existId){ST.proAthletes=(ST.proAthletes||[]).map(a=>a.id===existId?{...a,...data}:a);}
else{ST.proAthletes=[...(ST.proAthletes||[]),{...data,id:uid()}];}
sv("cba_pro_athletes",ST.proAthletes);
const el=document.getElementById("modal-wrap");if(el)el.innerHTML="";
reRender();
}
function deleteProAth(id){
if(!confirm(L("¿Eliminar este atleta pro?","Delete this pro athlete?")))return;
ST.proAthletes=(ST.proAthletes||[]).filter(a=>a.id!==id);
sv("cba_pro_athletes",ST.proAthletes);
const el=document.getElementById("modal-wrap");if(el)el.innerHTML="";
reRender();
}

function showReporteRendimiento() {
  const ath = ST.isCoach ? null : ST.user;
  const fecha = new Date().toISOString().split("T")[0];
  const saved = ld("cba_reporte_" + fecha, null);

  let h = `<div style="font-size:20px;font-weight:900;color:#D4A017;margin-bottom:4px">📊 CONTROL DIARIO</div>`;
  h += `<div style="font-size:11px;color:#7a9ab5;font-family:Barlow;margin-bottom:16px">${fecha} · ${esc(ath ? ath.name : "Coach")}</div>`;

  h += `<div style="margin-bottom:12px"><label class="lbl">PESO DE HOY (lbs)</label>
    <input type="number" class="inp" id="rep-peso" step="0.1" placeholder="Ej: 147.5" value="${esc(saved?.peso||"")}"></div>`;

  h += `<div style="margin-bottom:12px"><label class="lbl">HORAS DE SUEÑO ANOCHE</label>
    <input type="number" class="inp" id="rep-sueno" min="0" max="24" placeholder="Ej: 8" value="${esc(saved?.sueno||"")}"></div>`;

  h += `<div style="margin-bottom:16px"><label class="lbl">NIVEL DE FATIGA CORPORAL</label>
    <div style="display:grid;grid-template-columns:1fr;gap:6px" id="fatiga-btns">`;
  
  const fatigas = [
    {v:"1", label:"1 — FRESCO / Listo para la guerra", color:"#1a6b3c"},
    {v:"2", label:"2 — NORMAL", color:"#1a4a7a"},
    {v:"3", label:"3 — Cansancio moderado", color:"#D4A017"},
    {v:"4", label:"4 — Muy fatigado", color:"#c0392b"},
    {v:"5", label:"5 — AGOTAMIENTO EXTREMO / Riesgo lesión", color:"#8b1a1a"}
  ];
  const selFat = saved?.fatiga || "2";
  fatigas.forEach(f => {
    h += `<button onclick="selFatiga('${f.v}')" id="fat-${f.v}" style="background:${f.v===selFat?f.color:"#0f1e35"};border:2px solid ${f.color};color:#fff;border-radius:8px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;text-align:left">${f.label}</button>`;
  });
  h += `</div></div>`;

  h += `<div style="margin-bottom:14px"><label class="lbl">NOTAS DEL DÍA (opcional)</label>
    <textarea class="inp" id="rep-notas" rows="2" style="resize:none">${esc(saved?.notas||"")}</textarea></div>`;

  h += `<button onclick="guardarReporte()" class="btn btn-g" style="margin-bottom:8px">💾 GUARDAR REPORTE</button>`;
  
  // WhatsApp button if athlete
  if (ath) {
    h += `<button onclick="enviarReporteWA()" style="width:100%;background:#25D366;border:none;color:#fff;border-radius:10px;padding:12px;font-weight:900;font-size:14px;cursor:pointer;margin-top:4px">📲 ENVIAR AL COACH POR WHATSAPP</button>`;
  }
  h += `<div id="rep-msg" style="text-align:center;font-size:12px;margin-top:8px;min-height:16px"></div>`;

  document.getElementById("modal-wrap").innerHTML = mwrap(h);

  // Set selected fatigue
  setTimeout(() => {
    window._fatSel = selFat;
    fatigas.forEach(f => {
      const btn = document.getElementById("fat-" + f.v);
      if (btn) btn.style.background = f.v === selFat ? f.color : "#0f1e35";
    });
  }, 50);
}

const _fatigas = [
  {v:"1",color:"#1a6b3c"},{v:"2",color:"#1a4a7a"},{v:"3",color:"#D4A017"},
  {v:"4",color:"#c0392b"},{v:"5",color:"#8b1a1a"}
];
window._fatSel = "2";

function selFatiga(v) {
  window._fatSel = v;
  _fatigas.forEach(f => {
    const btn = document.getElementById("fat-" + f.v);
    if (btn) btn.style.background = f.v === v ? f.color : "#0f1e35";
  });
}

function guardarReporte() {
  const peso = document.getElementById("rep-peso")?.value;
  const sueno = document.getElementById("rep-sueno")?.value;
  const notas = document.getElementById("rep-notas")?.value || "";
  const msg = document.getElementById("rep-msg");

  if (!peso || !sueno) {
    if (msg) msg.innerHTML = '<span style="color:#e74c3c">Ingresa peso y horas de sueño</span>';
    return;
  }

  const fecha = new Date().toISOString().split("T")[0];
  const datos = {
    peso: parseFloat(peso),
    sueno: parseInt(sueno),
    fatiga: window._fatSel,
    notas: notas.trim(),
    fecha,
    atleta: ST.user ? ST.user.name : "Coach",
    ts: Date.now()
  };

  sv("cba_reporte_" + fecha, datos);

  // Save to history
  const hist = ld("cba_reportes_hist", []);
  hist.push(datos);
  if (hist.length > 30) hist.shift();
  sv("cba_reportes_hist", hist);

  if (msg) msg.innerHTML = '<span style="color:#1a8f4c">✅ Reporte guardado correctamente</span>';
}

function enviarReporteWA() {
  const peso = document.getElementById("rep-peso")?.value || "—";
  const sueno = document.getElementById("rep-sueno")?.value || "—";
  const notas = document.getElementById("rep-notas")?.value || "";
  const fatLabels = {
    "1":"Fresco ✅","2":"Normal ✅","3":"Cansancio moderado ⚠️",
    "4":"Muy fatigado 🔴","5":"Agotamiento extremo ❌"
  };
  const fecha = new Date().toISOString().split("T")[0];
  const nombre = ST.user ? ST.user.name : "Coach";
  const msg = `🥊 REPORTE DIARIO — ${nombre}\n📅 ${fecha}\n⚖️ Peso: ${peso} lbs\n😴 Sueño: ${sueno} hrs\n💪 Fatiga: ${fatLabels[window._fatSel]||window._fatSel}${notas?"\n📝 "+notas:""}`;
  window.open("https://wa.me/17027234009?text=" + encodeURIComponent(msg), "_blank");
}

function showSemaforoPeso() {
  const ath = ST.user;
  const pesoAtleta = ath ? ath.weight : 0;

  let h = `<div style="font-size:20px;font-weight:900;color:#D4A017;margin-bottom:4px">⚖️ SEMÁFORO DE PESO</div>`;
  h += `<div style="font-size:11px;color:#7a9ab5;font-family:Barlow;margin-bottom:16px">Control de categoría de pelea</div>`;

  h += `<div style="margin-bottom:12px"><label class="lbl">PESO OBJETIVO DE PELEA (lbs)</label>
    <input type="number" class="inp" id="sem-objetivo" value="${esc(pesoAtleta||"147")}" step="0.1"></div>`;

  h += `<div style="margin-bottom:16px"><label class="lbl">PESO DE HOY (lbs)</label>
    <input type="number" class="inp" id="sem-actual" step="0.1" placeholder="Ej: 151.2"></div>`;

  h += `<button onclick="evaluarSemaforo()" class="btn btn-g" style="margin-bottom:14px">📊 EVALUAR ESTADO</button>`;

  h += `<div id="semaforo-resultado" style="display:none;border-radius:12px;padding:16px;text-align:center;margin-bottom:10px"></div>`;

  h += `<div style="background:#0a1628;border-radius:10px;padding:12px;font-size:11px;color:#7a9ab5;font-family:Barlow;line-height:1.6">
    <div style="color:#D4A017;font-weight:700;margin-bottom:6px">📋 REFERENCIA</div>
    🟢 0–2 lbs arriba → En categoría<br>
    🟡 3–6 lbs arriba → Alerta — ajustar dieta<br>
    🔴 +6 lbs arriba → Fuera de categoría<br>
    🔵 Debajo del objetivo → Revisar energía
  </div>`;

  document.getElementById("modal-wrap").innerHTML = mwrap(h);
}

function evaluarSemaforo() {
  const objetivo = parseFloat(document.getElementById("sem-objetivo")?.value);
  const actual = parseFloat(document.getElementById("sem-actual")?.value);
  const res = document.getElementById("semaforo-resultado");

  if (!actual || isNaN(actual)) {
    alert("Ingresa tu peso actual");
    return;
  }

  const dif = actual - objetivo;
  res.style.display = "block";

  if (dif >= -2 && dif <= 2) {
    res.style.background = "#1a4a00";
    res.style.border = "2px solid #27ae60";
    res.innerHTML = `<div style="font-size:32px;margin-bottom:8px">🟢</div>
      <div style="font-size:18px;font-weight:900;color:#27ae60">EN CATEGORÍA</div>
      <div style="font-size:14px;color:#fff;margin-top:4px">${actual} lbs · objetivo: ${objetivo} lbs</div>
      <div style="font-size:12px;color:#ccc;font-family:Barlow;margin-top:8px">¡Excelente! Mantén la dieta y la intensidad. Listo para la báscula.</div>`;
  } else if (dif > 2 && dif <= 6) {
    res.style.background = "#2a2000";
    res.style.border = "2px solid #D4A017";
    res.innerHTML = `<div style="font-size:32px;margin-bottom:8px">🟡</div>
      <div style="font-size:18px;font-weight:900;color:#D4A017">ALERTA DE PESO</div>
      <div style="font-size:14px;color:#fff;margin-top:4px">+${dif.toFixed(1)} lbs sobre el objetivo</div>
      <div style="font-size:12px;color:#ccc;font-family:Barlow;margin-top:8px">Ajusta cardio al final de la sesión y cuida el consumo de agua y sodio.</div>`;
  } else if (dif > 6) {
    res.style.background = "#2a0000";
    res.style.border = "2px solid #e74c3c";
    res.innerHTML = `<div style="font-size:32px;margin-bottom:8px">🔴</div>
      <div style="font-size:18px;font-weight:900;color:#e74c3c">FUERA DE CATEGORÍA</div>
      <div style="font-size:14px;color:#fff;margin-top:4px">+${dif.toFixed(1)} lbs sobre el objetivo</div>
      <div style="font-size:12px;color:#ccc;font-family:Barlow;margin-top:8px">¡Alerta! Doble sesión cardio, sin sodio ni azúcar. Revisar plan alimentario con el Coach.</div>`;
  } else {
    res.style.background = "#0a1628";
    res.style.border = "2px solid #4a8aff";
    res.innerHTML = `<div style="font-size:32px;margin-bottom:8px">🔵</div>
      <div style="font-size:18px;font-weight:900;color:#4a8aff">DEBAJO DEL OBJETIVO</div>
      <div style="font-size:14px;color:#fff;margin-top:4px">${Math.abs(dif).toFixed(1)} lbs por debajo</div>
      <div style="font-size:12px;color:#ccc;font-family:Barlow;margin-top:8px">Revisa niveles de energía y carga carbohidratos limpios. Consulta al Coach.</div>`;
  }
}

} catch(e) { window.onerror(e.message,'runtime',0,0,e); }</script>

function getSessData(phase, week, dow, group) {

else if(phase===2) result = p2Session(week,dow,is90);
else if(phase===3) result = p3Session(week,dow,is90);
else if(phase===4) result = p4Session(week,dow,is90);

return result;
}

function marcarEntrenoPro(dia) {
