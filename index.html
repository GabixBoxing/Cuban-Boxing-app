#root{max-width:480px;margin:0 auto}
button{cursor:pointer;font-family:inherit;transition:opacity .1s}
button:active{opacity:.75;transform:scale(.97)}
input,select,textarea{font-family:inherit}
.page{display:none;padding:14px 14px 90px;min-height:100vh}
.page.on{display:block}

.nb.on{color:#D4A017}
.nb .ic{font-size:19px;line-height:1}
.card{background:#0f1e35;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #1e3050}
.gold{border-color:#D4A017}
.btn{width:100%;border:none;border-radius:10px;padding:13px;font-weight:800;font-size:15px;cursor:pointer;letter-spacing:.5px}
.btn-g{background:#D4A017;color:#000}
.btn-d{background:#1e3050;color:#D4A017}
.btn-gr{background:#1a6b3c;color:#fff}
.btn-r{background:#8b1a1a;color:#fff}
.inp{width:100%;background:#0f1e35;border:1.5px solid #1e3050;border-radius:8px;padding:11px 12px;color:#fff;font-size:14px;outline:none}
.inp:focus{border-color:#D4A017}
.sel{width:100%;background:#0f1e35;border:1.5px solid #1e3050;border-radius:8px;padding:11px 12px;color:#fff;font-size:14px;outline:none}
.lbl{display:block;font-size:10px;font-weight:700;color:#7a9ab5;letter-spacing:.5px;margin-bottom:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sh{display:flex;align-items:center;gap:8px;margin:16px 0 10px}
.sh .st{font-size:11px;font-weight:700;color:#D4A017;letter-spacing:2px;white-space:nowrap}
.sh .sl{flex:1;height:1px;background:#1e3050}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#0a1628;border-radius:20px 20px 0 0;padding:20px 16px 30px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;border:1px solid #1e3050}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#1e3050;border:2px solid #D4A017;transition:background .15s}
.pin-dot.on{background:#D4A017}
.pin-btn{background:#0f1e35;border:1px solid #1e3050;border-radius:12px;padding:16px;font-size:22px;font-weight:800;color:#fff}
.pin-btn:active{background:#D4A017;color:#000}
.prog{background:#1e3050;border-radius:4px;height:6px;overflow:hidden}
.prog-fill{height:100%;background:#D4A017;border-radius:4px;transition:width .3s}
.sc{display:inline-flex;align-items:center;gap:4px}
.sc-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.meal{background:#070d1a;border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid #D4A017}

function makeLogo(sz){
  const c=document.createElement("canvas");c.width=c.height=sz;
  const ctx=c.getContext("2d");
  const r=sz*.18;
  ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(sz-r,0);ctx.quadraticCurveTo(sz,0,sz,r);
  ctx.lineTo(sz,sz-r);ctx.quadraticCurveTo(sz,sz,sz-r,sz);
  ctx.lineTo(r,sz);ctx.quadraticCurveTo(0,sz,0,sz-r);
  ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
  ctx.fillStyle="#0d1f3c";ctx.fill();
  ctx.strokeStyle="#D4A017";ctx.lineWidth=sz*.055;ctx.stroke();
  ctx.fillStyle="#D4A017";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.font=`900 ${Math.floor(sz*.3)}px Arial Black,Arial`;ctx.fillText("CBA",sz/2,sz*.38);
  ctx.fillStyle="#fff";ctx.font=`700 ${Math.floor(sz*.13)}px Arial`;ctx.fillText("BOXING",sz/2,sz*.62);
  ctx.fillStyle="#4a8aff";ctx.font=`700 ${Math.floor(sz*.11)}px Arial`;ctx.fillText("OSVIMER",sz/2,sz*.79);
  return c.toDataURL("image/png");
}

function injectPWA(){
  const icon192=makeLogo(192);const icon512=makeLogo(512);
  const li=document.createElement("link");li.rel="icon";li.type="image/png";li.href=icon192;document.head.appendChild(li);
  const la=document.createElement("link");la.rel="apple-touch-icon";la.href=icon192;document.head.appendChild(la);
  const manifest={name:"Cuban Boxing App",short_name:"CBA Boxing",description:"Metodología Sagarra — Coach Osvimer",start_url:"./",scope:"./",display:"standalone",background_color:"#070d1a",theme_color:"#D4A017",orientation:"portrait-primary",icons:[{src:icon192,sizes:"192x192",type:"image/png",purpose:"any maskable"},{src:icon512,sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
  const lm=document.createElement("link");lm.rel="manifest";lm.href=URL.createObjectURL(blob);document.head.appendChild(lm);
}

function addPin(n){
  if(_pin.length>=4)return;
  _pin+=String(n);
  updatePinDots();
  if(_pin.length===4)setTimeout(checkPin,200);
}

function clearPin(){_pin=_pin.slice(0,-1);updatePinDots();}

function updatePinDots(){
  const dots=document.querySelectorAll(".pin-dot");
  dots.forEach((d,i)=>d.classList.toggle("on",i<_pin.length));
}

function checkPin(){
  const err=$("pin-err");
  if(_mode==="coach"){
    if(_pin===COACH_PIN){loginCoach();}
    else{if(err)err.textContent=L("PIN incorrecto — intenta de nuevo","Wrong PIN — try again");_pin="";updatePinDots();}
  } else {
    const sel=$("ath-sel");
    const athId=sel?sel.value:(ST.athletes[0]?.id||"");
    const ath=ST.athletes.find(a=>a.id===athId);
    if(ath&&_pin===(ath.pin||"1234")){loginAthlete(ath);}
    else{if(err)err.textContent=L("PIN incorrecto — intenta de nuevo","Wrong PIN — try again");_pin="";updatePinDots();}
  }
}

function deleteAthlete(id){

function advWeek(id){
  const a=ST.athletes.find(x=>x.id===id);if(!a)return;
  const maxW=Object.keys({1:12,2:10,3:8,4:4})[a.phase-1]?parseInt(Object.values({1:12,2:10,3:8,4:4})[a.phase-1]):4;
  let np=a.phase,nw=a.week+1;
  if(nw>maxW){nw=1;np=Math.min(np+1,5);}
  ST.athletes=ST.athletes.map(x=>x.id===id?{...x,phase:np,week:nw}:x);
  sv("cba_athletes",ST.athletes);
  closeModal();reRender();
}

    if(sessData.rival)h+=`<div style="font-size:11px;color:#D4A017;margin-bottom:8px">👊 ${esc(sessData.rival)} — ${sessData.pct}%</div>`;
    sessData.blocks.forEach((b,i)=>{
      h+=`<div style="display:flex;gap:10px;padding:7px 0;border-top:1px solid #0f1e35">`;
      h+=`<div style="width:46px;text-align:right;color:#D4A017;font-size:12px;font-weight:700;flex-shrink:0;padding-top:1px">${esc(b.t)}</div>`;

}

function getSession(phase,week,dow,group){
  const di=dow===0?6:dow-1;
  const is90=!(group&&(group.includes("C")||group.includes("B")));
  if(di>=5)return{title:L("Descanso Completo","Full Rest"),blocks:[],color:"#1e3050",rival:"",pct:0,dur:0};
  const color=PC[phase]||PC[1];
  const RIVALS={1:["Estático","Retrocede","Retrocede","Responde","Baja guardia","Zurdo básico","Activo","Zurdo activo","Rival alto","Contragolpeador","Impredecible","Libre"],2:["Presionador","Buscador cuerpo","Zurdo activo","Contragolpeador","Rival alto","Retrocede","Cambia estilo","Todos estilos","Todos estilos","Libre"],3:["Presionador","Doble amenaza","Presionador zurdo","Contragolpeador avanzado","Alto cambia ritmo","Todos estilos","Libre","Libre"],4:["Rival de la pelea","Rival de la pelea","Plan fijo","Combate real"]};
  const PCTS={1:[65,67,70,72,74,76,78,80,82,84,86,88],2:[80,82,83,84,85,86,87,89,90,91],3:[88,89,90,91,92,93,95,95],4:[88,80,70,65]};
  const rival=(RIVALS[phase]||[])[week-1]||"Rival activo";
  const pct=(PCTS[phase]||[])[week-1]||80;
  const SESSION_NAMES={
    1:{0:"Cuerda + Construcción",1:"Carrera + Escuela",2:"Cuerda + Aplicación",3:"Carrera + Sparring",4:"Tramos + Evaluación"},
    2:{0:"Cuerda + Mascota + Saco",1:"Carrera + Escuela + Sparring",2:"Cuerda + Mascota + Saco",3:"Carrera + Sparring",4:"Tramos + Shadow + Evaluación"},
    3:{0:"Cuerda + Mascota Asfixia",1:"Carrera + Sparring Libre",2:"Cuerda + Mascota Asfixia",3:"Carrera + Sparring Libre",4:"Tramos + Shadow + Evaluación"},
    4:{0:"ÚLTIMA CARGA — Mascota",1:"ÚLTIMA CARGA — Sparring",2:"REDUCCIÓN — Mascota",3:"REDUCCIÓN — Sparring",4:"EVALUACIÓN"}
  };
  const title=(SESSION_NAMES[phase]||{})[di]||L("Entrenamiento","Training");
  // Build blocks
  const blocks=[];
  const B=(n,d,t)=>({n,d,t});
  const warm=B(L("Calentamiento","Warm-up"),L("Movilidad completa","Full mobility"),is90?"12 min":"10 min");
  blocks.push(warm);
  if(di===0||di===2){
    blocks.push(B(L("Cuerda imaginaria","Shadow rope"),L(is90?"20 min":"15 min — ritmo combate","20 min — fight rhythm"),is90?"20 min":"15 min"));
    blocks.push(B("Shadow Sagarra",rival+" — "+pct+"%",is90?"10 min":"8 min"));
    blocks.push(B(L("Técnica/Mascota","Technical/Pads"),L("Construcción táctica","Tactical build"),is90?"18 min":"12 min"));
    blocks.push(B(L("Saco","Bag"),L(is90?"3×3min/1min":"3×2min/1min","3 rounds"),is90?"11 min":"8 min"));
    blocks.push(B(L("Físico","Physical"),L("Protocolo bloque","Block protocol"),is90?"12 min":"7 min"));
  } else if(di===1||di===3){
    blocks.push(B(L("Carrera continua","Continuous run"),is90?"20 min suave":"15 min suave",is90?"20 min":"15 min"));
    blocks.push(B("Shadow Sagarra",rival+" — "+pct+"%",is90?"10 min":"8 min"));
    blocks.push(B(L("Escuela combate","Combat school"),L("Corrección técnica","Technical correction"),is90?"15 min":"10 min"));
    if(phase>=2)blocks.push(B(L("Sparring condicionado","Conditioned sparring"),is90?"4×3min/1min":"3×2min/1min",is90?"15 min":"10 min"));
    blocks.push(B(L("Físico","Physical"),L("Protocolo bloque","Block protocol"),is90?"8 min":"5 min"));
  } else {
    blocks.push(B(L("Tramos","Sprints"),"4×50m / "+pct+"%","8 min"));
    blocks.push(B(L("Shadow evaluado","Evaluated shadow"),L("Entrenador observa","Coach observes"),is90?"15 min":"12 min"));
    blocks.push(B(L("Saco evaluación","Evaluation bag"),is90?"3×3min/1min":"3×2min/1min",is90?"11 min":"8 min"));
    blocks.push(B(L("Evaluación semanal","Weekly eval"),L("2 positivos + 1 a mejorar","2 positives + 1 to improve"),is90?"10 min":"7 min"));
  }
  blocks.push(B(L("Estiramiento","Stretching"),L("Completo","Full"),"5 min"));
  const dur=blocks.reduce((s,b)=>s+(parseInt(b.t)||0),0);
  return{title,blocks,color,rival,pct,dur};
}

  const CUT=[{s:"8+ sem",t:"Corte Natural",d:"Dieta limpia + entreno. Pérdida max 0.5kg/semana.",c:"#1a6b3c"},{s:"4-2 sem",t:"Corte Calórico",d:"Reducir 300-500 kcal/día. Eliminar sodio, azúcar, alcohol.",c:"#D4A017"},{s:"1 sem",t:"Reducción Sodio",d:"Sodio <1000mg/día. Reducir carbos 50%. Agua: 2L/día.",c:"#c0392b"},{s:"2-3 días",t:"Reducción Agua",d:"Agua 1L/día. Sauna max 15 min. SIEMPRE supervisado.",c:"#8b1a1a"},{s:"Post-pesaje",t:"REPOSICIÓN",d:"Min 1.5L bebida deportiva en primera hora.",c:"#5b2c8d"}];
  h+=`<div style="background:#0f1e35;border-radius:12px;overflow:hidden;margin-bottom:10px">`;
  CUT.forEach(s=>{h+=`<div style="display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid #070d1a"><div style="flex-shrink:0"><div style="background:${s.c};border-radius:6px;padding:2px 6px;font-size:9px;font-weight:700;color:#fff;white-space:nowrap">${s.s}</div></div><div><div style="font-size:13px;font-weight:800;color:#fff;margin-bottom:2px">${s.t}</div><div style="font-size:11px;color:#7a9ab5;line-height:1.4">${s.d}</div></div></div>`;});
  h+=`</div>`;
  h+=`<div style="background:#1a0000;border:2px solid #c0392b;border-radius:10px;padding:12px;margin-bottom:14px"><div style="font-size:12px;color:#ff6b6b;line-height:1.5">⚠ NUNCA bajar más del 8-10% del peso corporal. Bajar más de 5kg en agua es PELIGROSO. Siempre supervisado por el coach.</div></div>`;
  return h;
}

// ─── NOTES ────────────────────────────────────────────────────────────────
function renderNotes(){
  if(ST.isCoach)return renderCoachNotes();
  if(!ST.user)return ec("Inicia sesión primero");
  const msgs=ld(MSG_KEY+ST.user.id,[]);
  const today=new Date().toISOString().split("T")[0];
  const todayNote=msgs.find(m=>m.type==="note"&&m.date===today);
  const replies=msgs.filter(m=>m.type==="reply");
  let h=sh("MIS NOTAS DE HOY","📝");
  h+=`<div style="background:#070d1a;border:1px solid #1e3050;border-radius:10px;padding:12px;margin-bottom:10px;min-height:60px">`;
  h+=todayNote?`<div style="font-size:13px;color:#fff;line-height:1.5;white-space:pre-wrap">${esc(todayNote.text)}</div><div style="font-size:10px;color:#7a9ab5;margin-top:8px">${fD(todayNote.date)}</div>`:`<div style="font-size:12px;color:#4a6a8a">Sin notas hoy.</div>`;
  h+=`</div>`;
  h+=`<textarea class="inp" id="note-txt" rows="3" style="resize:none;margin-bottom:8px" placeholder="Escribe aquí...">${todayNote?esc(todayNote.text):""}</textarea>`;
  h+=`<button onclick="saveNote()" class="btn btn-g" style="margin-bottom:16px">GUARDAR NOTA</button>`;
  if(replies.length){
    h+=sh("RESPUESTAS DEL COACH","📬");
    replies.slice(-3).reverse().forEach(m=>{h+=`<div style="background:#1a6b3c;border-radius:10px;padding:10px;margin-bottom:8px"><div style="font-size:11px;color:#D4A017;font-weight:700;margin-bottom:4px">Coach Osvimer</div><div style="font-size:12px;color:#fff">${esc(m.text)}</div><div style="font-size:10px;color:rgba(255,255,255,.5);margin-top:4px">${fD(m.date)}</div></div>`;});
  }
  h+=sh("PREGUNTAR AL COACH","❓");
  h+=`<textarea class="inp" id="q-txt" rows="2" style="resize:none;margin-bottom:8px" placeholder="Escribe tu pregunta..."></textarea>`;
  h+=`<button onclick="sendQ()" class="btn" style="background:#1a4a7a;color:#fff">ENVIAR PREGUNTA</button>`;
  return h;
}

function renderCoachNotes(){
  let h=sh("COMUNICACIÓN CON ATLETAS","💬");
  ST.athletes.forEach(a=>{
    const msgs=ld(MSG_KEY+a.id,[]);
    const qs=msgs.filter(m=>m.type==="question");
    const unread=qs.filter(m=>!m.read).length;
    h+=`<div class="card" style="margin-bottom:10px">`;
    h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">${av(a.name,38)}<div style="flex:1"><div style="font-weight:800;font-size:15px;color:#fff">${esc(a.name)}</div>${unread>0?`<span style="background:#c0392b;color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700">${unread} nuevas</span>`:""}</div></div>`;
    if(qs.length){qs.slice(-2).forEach(q=>{h+=`<div style="background:#0a1628;border-radius:8px;padding:8px;margin-bottom:6px"><div style="font-size:10px;color:#7a9ab5">${fD(q.date)}</div><div style="font-size:12px;color:#fff">${esc(q.text)}</div></div>`;});}
    h+=`<div style="display:flex;gap:8px;margin-top:8px"><textarea id="rep-${a.id}" class="inp" rows="2" style="flex:1;resize:none" placeholder="Responder..."></textarea><button onclick="sendReply('${a.id}')" class="btn btn-g" style="width:auto;padding:10px 14px;font-size:13px">→</button></div>`;
    h+=`</div>`;
  });
  return h;
}

function saveNote(){
  if(!ST.user)return;
  const txt=gv("note-txt");if(!txt.trim())return;
  const msgs=ld(MSG_KEY+ST.user.id,[]);
  const today=new Date().toISOString().split("T")[0];
  const filtered=msgs.filter(m=>!(m.type==="note"&&m.date===today));
  filtered.push({type:"note",text:txt,date:today,from:"athlete"});
  sv(MSG_KEY+ST.user.id,filtered);reRender();
}

function sendQ(){
  if(!ST.user)return;
  const txt=gv("q-txt");if(!txt.trim())return;
  const msgs=ld(MSG_KEY+ST.user.id,[]);
  msgs.push({type:"question",text:txt,date:new Date().toISOString().split("T")[0],from:"athlete",read:false});
  sv(MSG_KEY+ST.user.id,msgs);
  window.open("https://wa.me/17027234009?text="+encodeURIComponent("Hola Coach Osvimer, soy "+ST.user.name+": "+txt),"_blank");
  reRender();
}

function sendReply(athId){
  const el=$("rep-"+athId);if(!el||!el.value.trim())return;
  const msgs=ld(MSG_KEY+athId,[]);
  msgs.push({type:"reply",text:el.value,date:new Date().toISOString().split("T")[0],from:"coach"});
  sv(MSG_KEY+athId,msgs);reRender();
}

// ─── INIT ─────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded",function(){
  // Load data
  const sa=ld("cba_athletes",[]);
  const sf=ld("cba_fights",[]);
  ST.athletes=sa.length?sa:DA;
  ST.fights=sf.length?sf:DF;
  if(!sa.length)sv("cba_athletes",DA);
  if(!sf.length)sv("cba_fights",DF);
  ST.lang=ld("cba_lang","es")||"es";
  // PWA
  try{injectPWA();}catch(e){}
  // Draw login logo
  setTimeout(()=>{const c=$("logo-canvas");if(c){const img=new Image();img.onload=()=>{const ctx=c.getContext("2d");ctx.drawImage(img,0,0,100,100);};img.src=makeLogo(100);}},100);
  // ALWAYS show login
  showLogin();
});
</script>
