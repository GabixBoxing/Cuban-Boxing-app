*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#070d1a;color:#fff;font-family:'Barlow Condensed','Impact',sans-serif;min-height:100vh;overflow-x:hidden}
#root{max-width:480px;margin:0 auto;position:relative}
input,select,textarea{font-family:'Barlow',sans-serif;font-size:14px}
button{cursor:pointer;font-family:'Barlow Condensed',sans-serif;transition:all .12s}
button:active{transform:scale(.96);opacity:.82}
.page{display:none;padding:14px 14px 90px;animation:fi .25s ease}
.page.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#hdr{background:linear-gradient(135deg,#0a1628,#0f1e35);border-bottom:2px solid #D4A017;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
#nav{position:fixed;bottom:0;left:0;right:0;background:#0a1628;border-top:2px solid #D4A017;display:flex;z-index:50;max-width:480px;margin:0 auto}
.nb{flex:1;background:none;border:none;color:#4a6a8a;padding:10px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;letter-spacing:1px}
.nb.on{color:#D4A017}.nb .ic{font-size:20px;line-height:1}
.nb .bar{width:24px;height:2px;background:#D4A017;border-radius:1px;margin-top:2px}
.card{background:#0f1e35;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #1e3050}
.card-g{border-color:#D4A017}
.btn{width:100%;border:none;border-radius:10px;padding:13px;font-weight:800;font-size:15px;letter-spacing:1px;cursor:pointer}
.btn-g{background:#D4A017;color:#070d1a}
.btn-d{background:#1e3050;color:#D4A017}
.btn-gr{background:#1a6b3c;color:#fff}
.btn-r{background:#8b1a1a;color:#fff}
.inp{width:100%;background:#0f1e35;border:1px solid #1e3050;border-radius:8px;padding:10px 12px;color:#fff;font-size:14px;outline:none}
.inp:focus{border-color:#D4A017}
.lbl{font-size:11px;color:#7a9ab5;display:block;margin-bottom:4px;letter-spacing:.5px;font-family:'Barlow'}
.av{border-radius:25%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;flex-shrink:0}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sh span:first-child{font-size:14px}
.sh .st{font-size:13px;color:#D4A017;font-weight:800;letter-spacing:2px}
.sh .sl{flex:1;height:1px;background:#1e3050}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:flex-end}
.modal-box{background:#0a1628;border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-height:92vh;overflow-y:auto;border:1px solid #1e3050;animation:fi .2s ease}
.prog-wrap{background:#1e3050;border-radius:4px;height:6px;overflow:hidden}
.prog-fill{height:100%;background:#D4A017;border-radius:4px}
.frow{display:flex;gap:8px;margin-bottom:10px}
.fcol{flex:1}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.fb{border:none;border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer}
.pin-box{display:flex;justify-content:center;gap:8px;margin:16px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;background:#1e3050;border:2px solid #D4A017;transition:background .15s}
.pin-dot.filled{background:#D4A017}
.pin-num-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;max-width:260px;margin:0 auto}
.pin-btn{background:#0f1e35;border:1px solid #1e3050;border-radius:12px;padding:18px;font-size:24px;font-weight:800;color:#fff;cursor:pointer}
.pin-btn:active{background:#D4A017;color:#070d1a}
.style-card{border-left:4px solid;margin-bottom:8px}
.style-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer}
.style-body{padding:0 14px 12px;display:none}
.style-body.on{display:block}
.note-area{width:100%;background:#0a1628;border:1px solid #1e3050;border-radius:8px;padding:10px;color:#fff;resize:none;font-family:'Barlow',sans-serif;font-size:13px;margin-top:6px}
.msg-bubble{border-radius:10px;padding:10px 12px;margin-bottom:8px;max-width:90%}
.msg-ath{background:#1e3050;align-self:flex-start;border-bottom-left-radius:2px}
.msg-coach{background:#1a6b3c;align-self:flex-end;border-bottom-right-radius:2px;margin-left:auto}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#D4A017;border-radius:2px}
</style>

// HELPERS
// ════════════════════════════════════════════════════════════════════════════
const ld=(k,d)=>{try{const r=localStorage.getItem(k);return r?JSON.parse(r):d;}catch(e){return d;}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
function age(d){if(!d)return"—";const b=new Date(d),t=new Date();let a=t.getFullYear()-b.getFullYear();if(t<new Date(t.getFullYear(),b.getMonth(),b.getDate()))a--;return a;}
function fD(d){if(!d)return"—";try{return new Date(d).toLocaleDateString(ST.lang==="es"?"es-ES":"en-US",{day:"2-digit",month:"short",year:"numeric"});}catch(e){return d;}}
function ini(n){return n.split(" ").slice(0,2).map(x=>x[0]||"").join("").toUpperCase();}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function avC(n){return AVC[n.charCodeAt(0)%AVC.length];}
function t(){return T[ST.lang];}
function L(es,en){return ST.lang==="es"?es:en;}
function B(n,d,tm){return{n,d,t:tm};} // session block
function av(name,sz){const c=avC(name);const r=Math.round(sz/4);return`<div class="av" style="width:${sz}px;height:${sz}px;border-radius:${r}px;background:${c};font-size:${Math.round(sz*.35)}px">${esc(ini(name))}</div>`;}
function badge(ph,wk,sm){const c=PC[ph]||PC[1];const p=t().pn(ph),w=t().wn(wk);const pad=sm?"2px 8px":"4px 10px";const fs=sm?11:13;return`<div style="display:inline-flex;align-items:center;gap:4px;background:${c};border-radius:6px;padding:${pad}"><span style="font-size:${fs}px;color:#fff">${esc(p)}</span><span style="font-size:${sm?10:12}px;color:rgba(255,255,255,.7)">${esc(w)}</span></div>`;}
function sdot(st){const c=t().sc[st]||"#7a9ab5";return`<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:${c};display:inline-block"></span><span style="font-size:10px;color:${c};font-family:Barlow;font-weight:600">${esc(st||"").toUpperCase()}</span></span>`;}
function sh(title,icon){return`<div class="sh"><span>${icon}</span><span class="st">${esc(title).toUpperCase()}</span><div class="sl"></div></div>`;}
function ec(msg){return`<div class="card" style="text-align:center;color:#4a6a8a;font-family:Barlow;font-size:13px">${esc(msg)}</div>`;}
function mwrap(content){return`<div class="modal-bg" onclick="closeMBG(event)"><div class="modal-box" onclick="event.stopPropagation()"><div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button onclick="closeM()" class="btn btn-d" style="width:auto;padding:6px 14px;font-size:13px">✕ ${L("CERRAR","CLOSE")}</button></div>${content}</div></div>`;}
function inp(lb,k,tp,val,ext){return`<div style="margin-bottom:10px"><label class="lbl">${esc(lb).toUpperCase()}</label><input type="${tp}" class="inp" id="f-${k}" value="${esc(val||"")}" ${ext||""}></div>`;}
function sel(lb,k,opts,val){return`<div style="margin-bottom:10px"><label class="lbl">${esc(lb).toUpperCase()}</label><select class="inp" id="f-${k}">${opts.map(o=>`<option value="${esc(o)}"${o===val?" selected":""}>${esc(o)}</option>`).join("")}</select></div>`;}

// PHASE 1 session builder (verified from fase1_adultos.pdf)
function p1Session(week, dow, is90) {
  const di = dow===0?6:dow-1;
  if(di>=5) return null; // rest
  const hm = week>=7;
  const wk = WP[1][week]||WP[1][1];
  const el = L(wk.es,wk.en), ri = L(wk.re,wk.rn), pct = wk.p;
  const pc = PC[1];

  if(di===0||di===2) { // Mon/Wed - Cuerda+Técnica
    const isMon = di===0;
    const tecTime = is90?(hm?"18 min":"20 min"):"10 min";
    let blocks = [
      B(L("Calentamiento dinámico","Dynamic warm-up"), L("Movilidad completa","Full mobility"), is90?"15 min":"10 min"),
      B(L("Cuerda imaginaria","Shadow rope"), "15 min — "+ri+" — "+pct+"%", is90?"15 min":"12 min"),
      B("Shadow Sagarra", L("Sistema completo — ","Full system — ")+ri+" — "+pct+"%", is90?"10 min":"8 min"),
      B(L("Técnica dirigida","Directed technique"), (isMon?L("Construcción: ","Build: "):L("Aplicación: ","Apply: "))+el, tecTime),
      B(L("Saco táctico","Tactical bag"), is90?L("3 asaltos × 3 min / 1 min = 11 min","3 rounds × 3 min / 1 min = 11 min"):L("3 asaltos × 2 min / 1 min = 8 min","3 rounds × 2 min / 1 min = 8 min"), is90?"11 min":"8 min"),
    ];
    if(hm) blocks.push(B(L("Mascota","Pad work"), is90?L("2 asaltos × 3 min / 1 min = 7 min","2 rounds × 3 min / 1 min = 7 min"):L("2 asaltos × 2 min / 1 min = 5 min","2 rounds × 2 min / 1 min = 5 min"), is90?"7 min":"5 min"));
    blocks.push(B(L("Físico","Physical"), L("Ver protocolo Bloque ","See Block ")+(week<=3?"1":week<=6?"2":week<=9?"3":"4")+" Fase 1", is90?(hm?"9 min":"14 min"):"7 min"));
    blocks.push(B(L("Estiramiento","Stretching"), L("Completo","Full"), "5 min"));
    const title = isMon?L("Cuerda + Construcción","Rope + Build"):L("Cuerda + Aplicación","Rope + Apply");
    return {title,blocks,el,ri,pct,pc,type:"lx"};
  }

  if(di===1||di===3) { // Tue/Thu - Carrera+Escuela
    const isThu = di===3;
    const hasSpar = hm&&isThu;
    let blocks = [
      B(L("Calentamiento dinámico","Dynamic warm-up"), L("Movilidad completa","Full mobility"), is90?"15 min":"10 min"),
      B(L("Carrera continua","Continuous run"), is90?L("20 min suave conversacional","20 min easy conversational"):L("15 min suave conversacional","15 min easy conversational"), is90?"20 min":"15 min"),
      B("Shadow Sagarra", L("Plan activo — ","Active plan — ")+ri+" — "+pct+"%", is90?"10 min":"7 min"),
      B(L("Escuela de combate","Combat school"), L("Corrección del punto débil — ","Weak point — ")+el, is90?(hasSpar?"15 min":"20 min"):"10 min"),
      B(L("Saco técnico","Technical bag"), is90?L("2 asaltos × 3 min / 1 min = 7 min","2 rounds × 3 min / 1 min = 7 min"):L("2 asaltos × 2 min / 1 min = 5 min","2 rounds × 2 min / 1 min = 5 min"), is90?"7 min":"5 min"),
    ];
    if(hasSpar) blocks.push(B(L("Sparring condicionado","Conditioned sparring"), is90?L("2 asaltos × 3 min / 1 min = 7 min","2 rounds × 3 min / 1 min = 7 min"):L("2 asaltos × 2 min / 1 min = 5 min","2 rounds × 2 min / 1 min = 5 min"), is90?"7 min":"5 min"));
    else blocks.push(B(L("Shadow recuperación","Recovery shadow"), L("Suave — manos arriba","Easy — hands up"), is90?"8 min":"8 min"));
    blocks.push(B(L("Físico","Physical"), L("Ver protocolo Bloque ","See Block ")+(week<=3?"1":week<=6?"2":week<=9?"3":"4")+" Fase 1", is90?(hasSpar?"11 min":"13 min"):"8 min"));
    blocks.push(B(L("Estiramiento","Stretching"), L("Completo","Full"), "5 min"));
    const title = isThu?L("Carrera + Sparring","Run + Sparring"):L("Carrera + Escuela","Run + Drills");
    return {title,blocks,el,ri,pct,pc,type:"mj"};
  }

  // Fri
  let blocks = [
    B(L("Calentamiento dinámico","Dynamic warm-up"), L("Movilidad completa","Full mobility"), is90?"15 min":"10 min"),
    B(L("4 tramos × 50m","4 × 50m sprints"), is90?L("80-88% velocidad / trote de regreso","80-88% speed / jog back"):L("80% velocidad / trote de regreso","80% speed / jog back"), is90?"10 min":"8 min"),
    B(L("Shadow libre evaluado","Free evaluated shadow"), L("Entrenador registra sin intervenir","Coach records without intervening"), is90?"15 min":"12 min"),
    B(L("Saco evaluación","Evaluation bag"), is90?L("3 asaltos × 3 min / 1 min = 11 min","3 rounds × 3 min / 1 min = 11 min"):L("3 asaltos × 2 min / 1 min = 8 min","3 rounds × 2 min / 1 min = 8 min"), is90?"11 min":"8 min"),
  ];
  if(hm) blocks.push(B(L("Mascota evaluada","Evaluated pad work"), is90?L("2 asaltos × 3 min / 1 min = 7 min","2 rounds × 3 min / 1 min = 7 min"):L("2 asaltos × 2 min / 1 min = 5 min","2 rounds × 2 min / 1 min = 5 min"), is90?"7 min":"5 min"));
  blocks.push(B(L("Físico","Physical"), L("Ver protocolo Bloque ","See Block ")+(week<=3?"1":week<=6?"2":week<=9?"3":"4")+" Fase 1", is90?(hm?"15 min":"25 min"):"10 min"));
  blocks.push(B(L("Evaluación semanal","Weekly evaluation"), L("2 positivos + 1 a mejorar","2 positives + 1 to improve"), is90?(hm?"12 min":"9 min"):"7 min"));
  blocks.push(B(L("Estiramiento","Stretching"), L("Completo","Full"), "5 min"));
  return {title:L("Tramos + Evaluación","Sprints + Eval"),blocks,el,ri,pct,pc,type:"v"};
}

// PHASE 2 session builder (VERIFIED from fase2_completa.pdf)
function p2Session(week, dow, is90) {
  const di = dow===0?6:dow-1;
  if(di>=5) return null;
  const wk = WP[2][week]||WP[2][1];
  const el = L(wk.es,wk.en), ri = L(wk.re,wk.rn), pct = wk.p;
  const pc = PC[2];
  const b1 = week<=3; // Bloque 1: lighter sparring (2 min rounds)
  // Sparring: weeks 1-3=5×2/1=14min(o16),4×2/1=11min(u16) / weeks 4+=5×3/1=19min(o16),4×3/1=15min(u16)
  const sparStr = is90?(b1?L("5 asaltos × 2 min / 1 min = 14 min — solo rectos","5 rounds × 2 min / 1 min = 14 min — straights only"):L("5 asaltos × 3 min / 1 min = 19 min","5 rounds × 3 min / 1 min = 19 min")):(b1?L("4 asaltos × 2 min / 1 min = 11 min — solo rectos","4 rounds × 2 min / 1 min = 11 min — straights only"):L("4 asaltos × 3 min / 1 min = 15 min","4 rounds × 3 min / 1 min = 15 min"));
  const sparT = is90?(b1?"14 min":"19 min"):(b1?"11 min":"15 min");
  const mascStr = is90?L("5 asaltos × 3 min / 1.5 min = 21 min","5 rounds × 3 min / 1.5 min = 21 min"):L("4 asaltos × 3 min / 1.5 min = 17 min","4 rounds × 3 min / 1.5 min = 17 min");
  const mascT = is90?"21 min":"17 min";
  const sacoStr = is90?L("4 asaltos × 2 min / 1 min = 11 min","4 rounds × 2 min / 1 min = 11 min"):L("3 asaltos × 2 min / 1 min = 8 min","3 rounds × 2 min / 1 min = 8 min");
  const sacoT = is90?"11 min":"8 min";

  if(di===0||di===2) { // Mon/Wed: Cuerda + Tramos + Mascota + Saco (VERIFIED)
    const blocks = [
      B(L("Calentamiento dinámico","Dynamic warm-up"), L("Movilidad completa","Full mobility"), is90?"12 min":"10 min"),
      B(L("Cuerda imaginaria","Shadow rope"), (is90?"20 min":"18 min")+L(" — rival "+ri+" — ráfaga "+(is90?"12":"8")+" rectos cada 2:30"," — "+ri+" — "+( is90?"12":"8")+" straights every 2:30"), is90?"20 min":"18 min"),
      B(L("4 tramos × 50m","4 × 50m sprints"), L(pct+"% / trote de regreso",pct+"% / jog back"), "7 min"),
      B("Shadow Sagarra", ri+" — "+L("plan activo","active plan")+" — "+pct+"%", is90?"10 min":"8 min"),
      B(L("Mascota educativa","Educational pad work"), mascStr+" — 70%", mascT),
      B(L("Saco técnico","Technical bag"), sacoStr, sacoT),
      B(L("Físico","Physical"), L("Ver protocolo Bloque ","See Block ")+(week<=3?"1":week<=7?"2":"3")+" Fase 2", is90?"9 min":"7 min"),
    ];
    const title = di===0?L("Cuerda + Mascota + Saco","Rope + Pads + Bag"):L("Cuerda + Mascota + Saco (Var)","Rope + Pads + Bag (Var)");
    return {title,blocks,el,ri,pct,pc,type:"lx"};
  }

  if(di===1||di===3) { // Tue/Thu: Carrera + Escuela + SPARRING (VERIFIED - BOTH DAYS)
    const isThu = di===3;
    const escTime = is90?(b1?"15 min":"12 min"):"10 min";
    const recupTime = is90?(b1?"10 min":"8 min"):"8 min";
    const blocks = [
      B(L("Calentamiento dinámico","Dynamic warm-up"), L("Movilidad completa","Full mobility"), is90?"12 min":"10 min"),
      B(L("Carrera continua","Continuous run"), is90?L("22 min conversacional","22 min conversational"):L("20 min conversacional","20 min conversational"), is90?"22 min":"20 min"),
      B("Shadow Sagarra", ri+" — "+pct+"%", is90?"10 min":"8 min"),
      B(L("Escuela de combate","Combat school"), L("Corrección individual — ","Individual correction — ")+el, escTime),
      B(L("Sparring condicionado","Conditioned sparring"), sparStr, sparT),
      B(L("Shadow recuperación","Recovery shadow"), L("Ritmo suave — manos ARRIBA","Easy rhythm — hands UP"), recupTime),
      B(L("Físico","Physical"), L("Ver protocolo Bloque ","See Block ")+(week<=3?"1":week<=7?"2":"3")+" Fase 2", is90?"7 min":"4 min"),
    ];
    const title = isThu?L("Carrera + Sparring + Análisis","Run + Sparring + Analysis"):L("Carrera + Escuela + Sparring","Run + Drills + Sparring");
    return {title,blocks,el,ri,pct,pc,type:"mj"};

// Main session getter
function getSessData(phase, week, dow, group) {
  const di = dow===0?6:dow-1;
  if(di>=5) return {title:L("Descanso Completo","Full Rest"),blocks:[],el:"",ri:"",pct:0,pc:"#1e3050",type:"rest"};
  const is90 = !(group&&(group.includes("C")||group.includes("Grupo C")||group.includes("Group C")||group.includes("B")||group.includes("Grupo B")||group.includes("Group B")));
  let result;
  if(phase===1) result = p1Session(week,dow,is90);
  else if(phase===2) result = p2Session(week,dow,is90);
  else if(phase===3) result = p3Session(week,dow,is90);
  else if(phase===4) result = p4Session(week,dow,is90);
  else result = null;
  if(!result) return {title:L("Descanso Activo","Active Rest"),blocks:[],el:L("Mantenimiento","Maintenance"),ri:"",pct:70,pc:PC[5]||"#4a4a1a",type:"rest"};
  result.dur = result.blocks.reduce((s,b)=>s+(parseInt(b.t)||0),0);
  return result;
}

// SESSION CARD HTML
// ════════════════════════════════════════════════════════════════════════════
function sessCard(s,id,open){
  const isR=s.type==="rest"||s.type==="fight";
  const dur=s.dur||0;
  let h=`<div class="card" style="padding:0;overflow:hidden;${open?`border-color:${s.pc}`:""}">`;
  h+=`<div onclick="toggleSC('${id}')" style="padding:13px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer">`;
  h+=`<div style="flex:1"><div style="font-weight:800;font-size:17px;color:#fff">${esc(s.title)}</div>`;
  if(s.el&&s.type!=="rest")h+=`<div style="font-size:11px;color:#D4A017;font-family:Barlow;font-weight:600;margin-top:2px">${esc(s.el)}</div>`;
  h+=`</div><div style="display:flex;align-items:center;gap:8px">`;
  h+=`<div style="background:${isR?"#1e3050":s.pc};border-radius:6px;padding:4px 10px;font-weight:700;font-size:13px;color:#fff">${isR?L("Descanso","Rest"):dur+" min"}</div>`;
  h+=`<span id="arr-${id}" style="color:#D4A017;font-size:14px">${open?"▲":"▼"}</span></div></div>`;
  h+=`<div id="bd-${id}" style="${open?"":"display:none"}">`;
  if(!isR&&s.blocks.length>0){
    h+=`<div style="padding:8px 14px;background:#0a1628;display:flex;gap:16px;flex-wrap:wrap">`;
    h+=`<div><span style="font-size:10px;color:#7a9ab5;font-family:Barlow">${L("Rival:","Opponent:")} </span><span style="font-size:10px;color:#fff;font-family:Barlow;font-weight:600">${esc(s.ri||s.rival||"")}</span></div>`;
    h+=`<div><span style="font-size:10px;color:#7a9ab5;font-family:Barlow">${L("Intensidad:","Intensity:")} </span><span style="font-size:10px;color:#D4A017;font-family:Barlow;font-weight:600">${s.pct||0}%</span></div></div>`;
    s.blocks.forEach((b,i)=>{
      h+=`<div style="display:flex;align-items:flex-start;gap:10px;padding:7px 14px;border-top:1px solid #0f1e35;background:${i%2===0?"#0a1420":"transparent"}">`;
      h+=`<div style="width:44px;text-align:right;font-size:12px;color:#D4A017;font-weight:700;flex-shrink:0;padding-top:2px">${esc(b.t)}</div>`;
      h+=`<div style="flex:1"><div style="font-weight:700;font-size:13px;color:#fff">${esc(b.n)}</div><div style="font-size:11px;color:#7a9ab5;font-family:Barlow;line-height:1.3">${esc(b.d)}</div></div></div>`;
    });
    h+=`<div style="padding:8px 14px;background:linear-gradient(135deg,#1a2744,#0f1e35);display:flex;justify-content:space-between"><span style="font-size:13px;color:#7a9ab5;font-weight:700">TOTAL</span><span style="font-size:15px;color:#D4A017;font-weight:800">${dur} min</span></div>`;
  }
  h+=`</div></div>`;
  return h;
}
function toggleSC(id){const bd=document.getElementById("bd-"+id);const ar=document.getElementById("arr-"+id);if(!bd)return;const vis=bd.style.display!=="none";bd.style.display=vis?"none":"block";if(ar)ar.textContent=vis?"▼":"▲";}

function goTab(tab){
  ST.tab=tab;
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("on"));
  const pg=document.getElementById("pg-"+tab);
  if(pg)pg.classList.add("on");
  document.querySelectorAll(".nb").forEach(b=>{b.classList.remove("on");const bar=b.querySelector(".bar");if(bar)bar.remove();});
  const nb=document.getElementById("nb-"+tab);
  if(nb){nb.classList.add("on");if(!nb.querySelector(".bar")){const d=document.createElement("div");d.className="bar";nb.appendChild(d);}}
  renderTab(tab);
}
function renderTab(tab){
  const el=document.getElementById("pg-"+tab);
  if(!el)return;
  el.classList.remove("fi");void el.offsetWidth;el.classList.add("fi");
  if(tab==="home")el.innerHTML=renderHome();
  else if(tab==="athletes")el.innerHTML=renderAthletes();
  else if(tab==="training")el.innerHTML=renderTraining();
  else if(tab==="fights")el.innerHTML=renderFights();
  else if(tab==="tactics")el.innerHTML=renderTactics();
  else if(tab==="notes")el.innerHTML=renderNotes();
  else if(tab==="nutrition")el.innerHTML=renderNutrition();
  else if(tab==="store")el.innerHTML=renderStore();
  updateHdr();
}

  }
  return h;
}

function renderTraining(){
  const tl=t();
  const athId=ST.isCoach?(ST.trainPick||ST.athletes[0]?.id):ST.user?.id;
  const ath=ST.athletes.find(a=>a.id===athId)||ST.athletes[0];
  if(!ath)return ec(tl.noA);
  const day=ST.trainDay!==null?ST.trainDay:new Date().getDay();
  const grp=ath.group||"Mayores 16";
  const s=getSessData(ath.phase,ath.week,day,grp);

  h+=`<div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:10px;color:#7a9ab5;font-family:Barlow">${tl.wk} ${ath.week} ${tl.of} ${maxW}</span><span style="font-size:10px;color:#D4A017;font-family:Barlow;font-weight:600">${prog}% ${tl.done}</span></div></div>`;

  h+=`<div style="display:flex;gap:4px;margin-bottom:12px">${[1,2,3,4,5,6,0].map((d,i)=>`<button onclick="setTD(${d})" style="flex:1;background:${day===d?"#D4A017":"#0f1e35"};color:${day===d?"#070d1a":"#7a9ab5"};border:none;border-radius:6px;padding:8px 2px;font-weight:700;font-size:10px">${dl[i]}</button>`).join("")}</div>`;

  h+=sh(tl.today,"📋");
  h+=sessCard(s,"s-today",true);
  h+=sh(L("Mañana","Tomorrow"),"🔮");
  h+=sessCard(tm,"s-tom",false);

  if(ST.isCoach){
    h+=`<div style="display:flex;gap:8px;margin-top:8px">`;
    h+=`<button onclick="advAth('${ath.id}')" class="btn btn-gr" style="flex:1">${L("AVANZAR SEMANA ▶","ADVANCE WEEK ▶")}</button>`;
    h+=`</div>`;
  }
  return h;
}

  return phaseSect()+stylesSect();
}

function renderNotes(){
  const tl=t();
  if(ST.isCoach) return renderCoachNotes();
  if(!ST.user) return ec(L("Inicia sesión primero","Please log in first"));
  const msgs=ld(MESSAGES_KEY+ST.user.id,[]);
  const today=new Date().toISOString().split("T")[0];
  const todayNote=msgs.find(m=>m.type==="note"&&m.date===today);
  let h=`<div style="margin-bottom:20px">`;
  h+=sh(tl.myNotes,"📝");
  h+=`<div class="card" style="margin-bottom:10px">`;
  if(todayNote){h+=`<div style="font-size:13px;color:#fff;font-family:Barlow;line-height:1.5;white-space:pre-wrap">${esc(todayNote.text)}</div><div style="font-size:10px;color:#7a9ab5;margin-top:8px;font-family:Barlow">${fD(todayNote.date)}</div>`;}
  else{h+=`<div style="font-size:12px;color:#7a9ab5;font-family:Barlow">${tl.noNotes}</div>`;}
  h+=`</div>`;
  h+=`<textarea id="note-txt" class="note-area" rows="4" placeholder="${esc(tl.writeNote)}">${todayNote?esc(todayNote.text):""}</textarea>`;
  h+=`<button onclick="saveNote()" class="btn btn-g" style="margin-top:8px">${tl.saveNote}</button>`;
  h+=`</div>`;

  // Questions
  h+=sh(tl.myQ,"❓");
  const coachReplies=msgs.filter(m=>m.type==="reply");
  if(coachReplies.length>0){
    h+=`<div style="margin-bottom:12px">`;
    coachReplies.slice(-3).reverse().forEach(m=>{
      h+=`<div class="card msg-coach" style="margin-bottom:8px"><div style="font-size:11px;color:#D4A017;font-weight:700;margin-bottom:4px">Coach Osvimer</div><div style="font-size:12px;color:#fff;font-family:Barlow">${esc(m.text)}</div><div style="font-size:10px;color:rgba(255,255,255,.5);margin-top:4px">${fD(m.date)}</div></div>`;
    });
    h+=`</div>`;
  }
  h+=`<textarea id="q-txt" class="note-area" rows="3" placeholder="${esc(tl.writeNote)}"></textarea>`;
  h+=`<button onclick="sendQ()" class="btn btn-g" style="margin-top:8px;background:#1a4a7a;color:#fff">${tl.sendQ}</button>`;
  return h;
}

function renderCoachNotes(){
  const tl=t();
  let h=sh(L("COMUNICACIÓN CON ATLETAS","ATHLETE COMMUNICATIONS"),"💬");
  ST.athletes.forEach(a=>{
    const msgs=ld(MESSAGES_KEY+a.id,[]);
    const qs=msgs.filter(m=>m.type==="question");
    const notes=msgs.filter(m=>m.type==="note");
    if(qs.length===0&&notes.length===0)return;
    h+=`<div class="card" style="margin-bottom:12px">`;
    h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">${av(a.name,36)}<div style="font-weight:700;font-size:16px;color:#fff">${esc(a.name)}</div></div>`;
    if(notes.length>0){
      h+=`<div style="font-size:11px;color:#D4A017;font-weight:700;margin-bottom:4px">${L("NOTAS DE HOY","TODAY'S NOTES")}</div>`;
      notes.slice(-1).forEach(n=>{h+=`<div style="font-size:12px;color:#fff;font-family:Barlow;background:#0a1628;border-radius:6px;padding:8px;margin-bottom:8px;white-space:pre-wrap">${esc(n.text)}</div>`;});
    }
    if(qs.length>0){
      h+=`<div style="font-size:11px;color:#c0392b;font-weight:700;margin-bottom:4px">${L("PREGUNTAS","QUESTIONS")} (${qs.length})</div>`;
      qs.slice(-2).forEach(q=>{h+=`<div style="font-size:12px;color:#fff;font-family:Barlow;background:#1a1a2e;border-radius:6px;padding:8px;margin-bottom:6px">${esc(q.text)}<div style="font-size:10px;color:#7a9ab5;margin-top:4px">${fD(q.date)}</div></div>`;});
      h+=`<textarea id="rep-${a.id}" class="note-area" rows="2" placeholder="${esc(L("Responder...","Reply..."))}"></textarea>`;
      h+=`<button onclick="sendReply('${a.id}')" class="btn btn-gr" style="margin-top:6px;font-size:12px;padding:8px">${L("ENVIAR RESPUESTA","SEND REPLY")}</button>`;
    }
    h+=`</div>`;
  });
  if(h===sh(L("COMUNICACIÓN CON ATLETAS","ATHLETE COMMUNICATIONS"),"💬"))h+=ec(L("Sin mensajes todavía.","No messages yet."));
  return h;
}

    h+=inp(L("Rival","Opponent"),"opp","text");h+=inp(L("Fecha","Date"),"date","date");h+=inp(L("Categoría Peso","Weight Class"),"wc","text");h+=inp(L("Evento","Event"),"ev","text");

function gv(id){const e=document.getElementById(id);return e?e.value:"";}
function saveAth(existId){
  const a={name:gv("f-name"),dob:gv("f-dob"),weight:parseFloat(gv("f-wt"))||0,category:gv("f-cat"),group:gv("f-grp"),status:gv("f-st"),notes:gv("f-nt"),phase:parseInt(gv("f-ph"))||1,week:parseInt(gv("f-wk"))||1,wins:parseInt(gv("f-wn"))||0,losses:parseInt(gv("f-wl"))||0,draws:parseInt(gv("f-wd"))||0,pin:gv("f-pin")||"1234"};
  if(!a.name.trim()){alert(L("Ingresa un nombre","Enter a name"));return;}
  if(existId){ST.athletes=ST.athletes.map(x=>x.id===existId?{...x,...a}:x);}
  else{ST.athletes=[...ST.athletes,{...a,id:uid()}];}
  sv("cba_athletes",ST.athletes);closeM();reRender();
}
function saveFight(){
  const results=L(["Victoria","Derrota","Empate","Próxima"],["Win","Loss","Draw","Upcoming"]);
  const f={athleteId:gv("f-ath"),opponent:gv("f-opp"),date:gv("f-date"),result:results[_fres]||results[0],weightClass:gv("f-wc"),event:gv("f-ev"),notes:gv("f-fn"),id:uid()};
  ST.fights=[...ST.fights,f];sv("cba_fights",ST.fights);closeM();reRender();
}
function advAth(id){
  const a=ST.athletes.find(x=>x.id===id);if(!a)return;
  const mw=WP[a.phase]?Object.keys(WP[a.phase]).length:4;
  let np=a.phase,nw=a.week+1;
  if(nw>mw){nw=1;np=Math.min(np+1,5);}
  ST.athletes=ST.athletes.map(x=>x.id===id?{...x,phase:np,week:nw}:x);
  sv("cba_athletes",ST.athletes);closeM();reRender();
}
function setTP(id){ST.trainPick=id;renderTab("training");}
function setTD(d){ST.trainDay=d;renderTab("training");}
function setOP(p){ST.openPhase=ST.openPhase===p?null:p;ST.openWeek=null;ST.openDay=null;renderTab("tactics");}
function setOW(k){ST.openWeek=ST.openWeek===k?null:k;ST.openDay=null;renderTab("tactics");}
function setOD(k){ST.openDay=ST.openDay===k?null:k;renderTab("tactics");}
function setOS(i){ST.openStyle=ST.openStyle===i?null:i;renderTab("tactics");}
function setNutPhase(id){ST.openNut=ST.openNut===id?null:id;renderTab("nutrition");}
function saveNote(){
  if(!ST.user)return;
  const txt=gv("note-txt");if(!txt.trim())return;
  const msgs=ld(MESSAGES_KEY+ST.user.id,[]);
  const today=new Date().toISOString().split("T")[0];
  const filtered=msgs.filter(m=>!(m.type==="note"&&m.date===today));
  filtered.push({type:"note",text:txt,date:today,from:"athlete"});
  sv(MESSAGES_KEY+ST.user.id,filtered);renderTab("notes");
}
function sendQ(){
  if(!ST.user)return;
  const txt=gv("q-txt");if(!txt.trim())return;
  const msgs=ld(MESSAGES_KEY+ST.user.id,[]);
  msgs.push({type:"question",text:txt,date:new Date().toISOString().split("T")[0],from:"athlete",read:false});
  sv(MESSAGES_KEY+ST.user.id,msgs);
  const msg=encodeURIComponent(`Hola Coach Osvimer, soy ${ST.user.name}: ${txt}`);
  window.open(`https://wa.me/17027234009?text=${msg}`,"_blank");
  renderTab("notes");
}
function sendReply(athId){
  const txt=document.getElementById("rep-"+athId);if(!txt||!txt.value.trim())return;
  const msgs=ld(MESSAGES_KEY+athId,[]);
  msgs.push({type:"reply",text:txt.value,date:new Date().toISOString().split("T")[0],from:"coach"});
  sv(MESSAGES_KEY+athId,msgs);renderTab("notes");
}

function startLogin(mode){
  const tl=t();
  const app=document.getElementById("app");
  _pinBuf="";_pinMode=mode;_pinAthId="";

  let content="";
  if(mode==="athlete"){
    content=`<div style="margin-bottom:16px"><label class="lbl" style="text-align:center;display:block;font-size:14px">${tl.selectAth}</label>
    <select class="inp" id="ath-sel" style="border-color:#D4A017;font-size:16px">${ST.athletes.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join("")}</select></div>`;
  }
  content+=`<div style="font-size:14px;color:#7a9ab5;text-align:center;margin-bottom:8px;font-family:Barlow">${mode==="coach"?tl.enterCoachPin:tl.enterPin}</div>`;
  content+=`<div class="pin-box" id="pin-display">${[0,1,2,3].map(()=>`<div class="pin-dot"></div>`).join("")}</div>`;
  content+=`<div class="pin-num-grid">${[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map(n=>`<button class="pin-btn" onclick="pinInput('${n}')">${n}</button>`).join("")}</div>`;
  content+=`<div id="pin-err" style="text-align:center;color:#c0392b;font-size:13px;margin-top:8px;height:20px"></div>`;
  content+=`<button onclick="showLogin()" style="width:100%;background:none;border:none;color:#7a9ab5;margin-top:16px;font-size:13px;font-family:Barlow;cursor:pointer">← ${L("Volver","Back")}</button>`;

function pinInput(v){
  if(v==="")return;
  if(v==="⌫"){_pinBuf=_pinBuf.slice(0,-1);}
  else if(_pinBuf.length<4){_pinBuf+=String(v);}
  const dots=document.querySelectorAll(".pin-dot");
  dots.forEach((d,i)=>d.classList.toggle("filled",i<_pinBuf.length));
  if(_pinBuf.length===4)setTimeout(checkPin,150);
}

function checkPin(){
  const tl=t();
  const err=document.getElementById("pin-err");
  if(_pinMode==="coach"){
    const coachPin=ld(COACH_PIN_KEY,"1967");
    if(_pinBuf===coachPin){loginCoach();}
    else{if(err)err.textContent=tl.wrongPin;_pinBuf="";document.querySelectorAll(".pin-dot").forEach(d=>d.classList.remove("filled"));}
  } else {
    const athSel=document.getElementById("ath-sel");
    const athId=athSel?athSel.value:ST.athletes[0]?.id;
    const ath=ST.athletes.find(a=>a.id===athId);
    if(ath&&_pinBuf===(ath.pin||"1234")){loginAthlete(ath);}
    else{if(err)err.textContent=tl.wrongPin;_pinBuf="";document.querySelectorAll(".pin-dot").forEach(d=>d.classList.remove("filled"));}
  }
}

function loginCoach(){
  ST.isCoach=true;ST.user=null;
  sv("cba_session",{isCoach:true,userId:null});
  launchApp();
}
function loginAthlete(ath){
  ST.isCoach=false;ST.user=ath;
  sv("cba_session",{isCoach:false,userId:ath.id});
  launchApp();
}
function launchApp(){
  const app=document.getElementById("app");
  const shell=document.getElementById("main-shell");
  app.style.display="none";shell.style.display="block";
  injectLogo();
  updateHdr();goTab("home");
}
function logout(){sv("cba_session",null);ST.user=null;ST.isCoach=false;showLogin();}
function confirmLogout(){
  // Show custom logout modal instead of browser confirm
  const app=document.getElementById("app");
  const shell=document.getElementById("main-shell");
  const who=ST.isCoach?"COACH":ST.user?ST.user.name:"";
  document.getElementById("modal-wrap").innerHTML=`<div class="modal-bg" style="z-index:999"><div class="modal-box" style="text-align:center;border:2px solid #e74c3c">
    <div style="font-size:40px;margin-bottom:12px">⇄</div>
    <div style="font-size:18px;font-weight:900;color:#e74c3c;margin-bottom:6px">${L("CAMBIAR USUARIO","SWITCH USER")}</div>
    <div style="font-size:13px;color:#7a9ab5;font-family:Barlow;margin-bottom:20px">${L("Sesión actual:","Current session:")} <span style="color:#D4A017;font-weight:700">${esc(who)}</span></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button onclick="logout()" style="width:100%;background:#8b1a1a;border:none;color:#fff;border-radius:10px;padding:14px;font-weight:900;font-size:15px;cursor:pointer">${L("🔓 SALIR Y CAMBIAR USUARIO","🔓 LOGOUT & SWITCH USER")}</button>
      <button onclick="closeM()" style="width:100%;background:#1e3050;border:none;color:#fff;border-radius:10px;padding:12px;font-weight:700;font-size:14px;cursor:pointer">${L("← CANCELAR","← CANCEL")}</button>
    </div>
  </div></div>`;
}

    <text x="342" y="295" font-family="'Arial Black',Impact,sans-serif" font-size="168" font-weight="900" fill="url(#gld)" text-anchor="middle" letter-spacing="-4">CBA</text>

function injectLogo(){const el=document.getElementById("hdr-logo");if(el)el.innerHTML=logoSVG(42);}

// ════════════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════════════
function init(){
  const a=ld("cba_athletes",[]);
  const f=ld("cba_fights",[]);
  ST.athletes=a.length>0?a:DA;
  ST.fights=f.length>0?f:DF;
  if(a.length===0)sv("cba_athletes",DA);
  if(f.length===0)sv("cba_fights",DF);
  ST.lang=ld("cba_lang","es")||"es";
  ST.openNut="n1";
  const sess=ld("cba_session",null);
  if(sess&&sess.isCoach){ST.isCoach=true;ST.user=null;launchApp();}
  else if(sess&&sess.userId){const ath=ST.athletes.find(a=>a.id===sess.userId);if(ath){ST.isCoach=false;ST.user=ath;launchApp();}else showLogin();}
  else{showLogin();}
}
window.addEventListener("DOMContentLoaded",init);
} catch(e) { window.onerror(e.message,'runtime',0,0,e); }
</script>
