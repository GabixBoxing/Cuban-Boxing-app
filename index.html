function goTab(tab){
  ST.tab=tab;
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("on"));
  const pg=document.getElementById("pg-"+tab);
  if(pg)pg.classList.add("on");
  document.querySelectorAll(".nb").forEach(b=>{b.classList.remove("on");const bar=b.querySelector(".bar");if(bar)bar.remove();});
  const nb=document.getElementById("nb-"+tab);
  if(nb){nb.classList.add("on");if(!nb.querySelector(".bar")){const d=document.createElement("div");d.className="bar";nb.appendChild(d);}}
  renderTab(tab);
}
function renderTab(tab){
  const el=document.getElementById("pg-"+tab);
  if(!el) return;
  if(tab==="home") el.innerHTML=renderHome();
  else if(tab==="athletes") el.innerHTML=renderAthletes();
  else if(tab==="training") el.innerHTML=renderTraining();
  else if(tab==="fights") el.innerHTML=renderFights();
  else if(tab==="tactics") el.innerHTML=renderTactics();
  else if(tab==="notes") el.innerHTML=renderNotes();
  else if(tab==="nutrition") el.innerHTML=renderNutrition();
  else if(tab==="store") el.innerHTML=renderStore();
  updateHdr();
}
function updateHdr(){
  const d=document.getElementById("hdr-date");
  const u=document.getElementById("hdr-user");
  const lb=document.getElementById("lang-btn");
  if(d)d.textContent=new Date().toLocaleDateString(ST.lang==="es"?"es-ES":"en-US",{weekday:"short",day:"2-digit",month:"short"}).toUpperCase();
  if(u)u.textContent=ST.isCoach?L("COACH OSVIMER","COACH OSVIMER"):(ST.proUser?"PRO: "+(ST.proUser.name.split(" ")[0].toUpperCase()):(ST.user?ST.user.name.split(" ")[0].toUpperCase():""));
  if(lb)lb.textContent=ST.lang==="es"?"EN":"ES";
  const icons=["🏠","🥊","📋","🏆","🎯","🥗","🛒","💬"];
  const nav=document.getElementById("nav");
  if(nav)nav.innerHTML=["home","athletes","training","fights","tactics","nutrition","store","notes"].map((id,i)=>`<button class="nb${ST.tab===id?" on":""}" id="nb-${id}" onclick="goTab('${id}')"><span class="ic">${icons[i]}</span><span>${t().nav[i]}</span>${ST.tab===id?'<div class="bar"></div>':""}</button>`).join("");
}

function renderProTraining() {
  if(!ST.proUser || ST.proUser.isCoachPro) return "<div class='card'>Acceso solo para atletas PRO</div>";
  const phaseId = ST.proUser.proPhase || 1;
  const currentWeek = ST.proUser.proWeek || 1;
  const phase = ProPhases.find(p => p.id === phaseId) || ProPhases[0];
  const maxWeeks = phase.weeks || 8;
  const progressPercent = Math.round((currentWeek / maxWeeks) * 100);
  let h = `<div class="card" style="background:linear-gradient(135deg,#0a1628,#162540)">
    <div style="display:flex; justify-content:space-between;"><div><span style="font-size:16px;font-weight:900">${phase.name}</span><br><span style="font-size:11px;color:#D4A017">${phase.sub}</span></div>
    <div style="background:${phase.color};border-radius:8px;padding:4px 12px;">Semana ${currentWeek}/${maxWeeks}</div></div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${progressPercent}%;background:${phase.color}"></div></div>
    <div style="font-size:10px;color:#7a9ab5">${progressPercent}% completado</div>
    <div style="font-size:11px;color:#D4A017;margin-top:6px;background:#0a1628;padding:8px;border-radius:8px">🎯 ${phase.focus}</div>
  </div>`;
  const days = ["mon","tue","wed","thu","fri"];
  const dayNames = { mon:"LUN", tue:"MAR", wed:"MIÉ", thu:"JUE", fri:"VIE" };
  const completedKey = `${phaseId}-${currentWeek}`;
  const completedDays = ST.proProgress.completed?.[completedKey] || [];
  for(let d of days) {
    const session = phase.sessions?.[d];
    if(!session) continue;
    const isCompleted = completedDays.includes(d);
    const sessionId = `pro-session-${phaseId}-${currentWeek}-${d}`;
    const open = ST.openProSession === sessionId;
    h += `<div class="card" style="padding:0;margin-bottom:10px;border-left:4px solid ${phase.color}">`;
    h += `<div onclick="toggleProSession('${sessionId}')" style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer">`;

    h += `<div style="display:flex;align-items:center;gap:8px">`;
    h += `<button onclick="event.stopPropagation(); toggleProDayComplete('${phaseId}','${currentWeek}','${d}')" style="background:${isCompleted ? '#1a8f4c' : '#1e3050'};border:none;border-radius:20px;padding:6px 12px;font-size:10px;color:#fff;font-weight:700">${isCompleted ? '✓ COMPLETADO' : '○ MARCAR'}</button>`;
    h += `<span id="arr-${sessionId}" style="color:#D4A017;font-size:14px">${open ? "▲" : "▼"}</span></div></div>`;
    h += `<div id="bd-${sessionId}" style="${open ? '' : 'display:none'}">`;
    if(session.blocks && session.blocks.length) {
      h += `<div style="background:#0a1628;padding:6px 0">`;
      session.blocks.forEach((b,i) => {
        h += `<div style="display:flex;gap:10px;padding:8px 14px;border-top:1px solid #0f1e35;background:${i%2===0?'#0a1420':'transparent'}">`;
        h += `<div style="width:46px;text-align:right;font-size:11px;color:#D4A017">${b.t}</div>`;
        h += `<div style="flex:1"><div style="font-weight:700;font-size:12px">${b.n}</div><div style="font-size:10px;color:#7a9ab5">${b.d||""}</div></div></div>`;
      });
      h += `</div>`;
    } else h += `<div class="card" style="margin:10px;text-align:center">Sin bloques</div>`;

  h += `<div class="card" style="background:linear-gradient(135deg,#1a1a2e,#0a0a18);margin-top:8px">`;
  h += `<div style="font-size:12px;font-weight:900;color:#D4A017;margin-bottom:8px">🌎 METODOLOGÍA INTEGRADA (CUB · USA · MEX)</div>`;

function toggleProSession(id) {

// Versión mejorada de toggleProDayComplete con racha y motivación
function toggleProDayComplete(phaseId, week, day) {
  if(!ST.proUser) return;
  const key = `${phaseId}-${week}`;
  if(!ST.proProgress.completed) ST.proProgress.completed = {};
  if(!ST.proProgress.completed[key]) ST.proProgress.completed[key] = [];
  const arr = ST.proProgress.completed[key];
  const idx = arr.indexOf(day);
  if(idx === -1) {
    arr.push(day);
    ST.proProgress.lastCompletionDate = new Date().toISOString();
    ST.proProgress.currentStreak = (ST.proProgress.currentStreak || 0) + 1;
    sv(`cba_pro_progress_${ST.proUser.id}`, ST.proProgress);
    updateProStatsAndAchievements(ST.proUser.id);
    showMotivationToast(getRandomMotivation());
  } else {
    arr.splice(idx,1);
    sv(`cba_pro_progress_${ST.proUser.id}`, ST.proProgress);
  }
  if(ST.proSubTab === "training") renderProContent();
}

function updateProStatsAndAchievements(athId) {
  let prog = ST.proProgress;
  if(!prog.completed) prog.completed = {};
  let completedDays = 0, totalDays = 0;
  for(let key in prog.completed) {
    completedDays += prog.completed[key].length;
    totalDays += 5;
  }
  let hoursTotal = (completedDays * 1.5).toFixed(1);
  let streak = prog.currentStreak || 0;
  let firstWeekComplete = (prog.completed[`${ST.proUser.proPhase}-1`] && prog.completed[`${ST.proUser.proPhase}-1`].length >= 5);
  let phaseComplete = false;
  let perfectWeek = false;
  const phaseWeeks = (ProPhases.find(p=>p.id===ST.proUser.proPhase)||{weeks:8}).weeks;
  let allWeeks = true;
  for(let w=1; w<=phaseWeeks; w++) {
    let wkKey = `${ST.proUser.proPhase}-${w}`;
    if(!prog.completed[wkKey] || prog.completed[wkKey].length < 5) { allWeeks = false; break; }
  }
  if(allWeeks && phaseWeeks>0) phaseComplete = true;
  let currentWeekKey = `${ST.proUser.proPhase}-${ST.proUser.proWeek}`;
  if(prog.completed[currentWeekKey] && prog.completed[currentWeekKey].length >= 5) perfectWeek = true;
  let stats = { completedDays, totalDays, hoursTotal, currentStreak: streak, firstWeekComplete, phaseComplete, perfectWeek };
  sv(`cba_pro_stats_${athId}`, stats);
  let unlocked = ld(`cba_achievements_${athId}`, []);
  ACHIEVEMENTS.forEach(ach => {
    if(!unlocked.includes(ach.id) && ach.check(stats)) {
      unlocked.push(ach.id);
      showMotivationToast(`🏆 ¡LOGRO! ${ach.icon} ${ach.name}`);
    }
  });
  sv(`cba_achievements_${athId}`, unlocked);
}

  toast.innerText = msg;
  toast.style.position = "fixed"; toast.style.bottom = "70px"; toast.style.left = "20px"; toast.style.right = "20px";
  toast.style.background = "#D4A017"; toast.style.color = "#070d1a"; toast.style.padding = "12px";
  toast.style.borderRadius = "12px"; toast.style.fontWeight = "bold"; toast.style.zIndex = "200";
  toast.style.textAlign = "center"; toast.style.fontSize = "12px";
  document.body.appendChild(toast);

}

  } else if(_pinMode==="pro"){

function resetPinDots(){ document.querySelectorAll(".pin-dot").forEach(d=>d.classList.remove("filled")); }
function loginCoach(){ ST.isCoach=true; ST.user=null; launchApp(); }
function loginProCoach(){ ST.isCoach=false; ST.user=null; ST.proUser={id:"pro_coach",name:"Coach PRO",isCoachPro:true}; launchApp(); }
function loginAthlete(ath){ ST.isCoach=false; ST.user=ath; launchApp(); }
function launchApp(){
  const app=document.getElementById("app");
  const shell=document.getElementById("main-shell");
  app.style.display="none"; shell.style.display="block";
  // Cargar datos guardados del progreso PRO
  if(ST.proUser && !ST.proUser.isCoachPro){
    let saved = ld(`cba_pro_progress_${ST.proUser.id}`, {});
    ST.proProgress = saved;
    let savedWeight = ld("cba_weight_records", {});
    ST.weightRecords = savedWeight;
    updateProStatsAndAchievements(ST.proUser.id);
  }
  updateHdr(); goTab("home");
}
function showSwitchModal(){
  let who = ST.isCoach?"COACH":(ST.proUser?ST.proUser.name.split(" ")[0]:(ST.user?ST.user.name:""));
  let html = `<div style="text-align:center"><div style="font-size:20px;font-weight:900">CERRAR SESIÓN</div><div>${who}</div><button onclick="logout()" class="btn btn-r" style="margin-top:16px">SALIR</button><button onclick="closeM()" class="btn btn-d">CANCELAR</button></div>`;
  document.getElementById("modal-wrap").innerHTML = mwrap(html);
}
function logout(){
  sv("cba_session", null);
  ST.user=null; ST.proUser=null; ST.isCoach=false;
  showLogin();
}
function logoSVG(sz){ return `<svg width="${sz}" height="${sz}" viewBox="0 0 512 512"><rect width="512" height="512" fill="#0d1f3c" rx="90"/><text x="256" y="340" font-family="Arial Black" font-size="200" fill="#D4A017" text-anchor="middle">CBA</text></svg>`; }
function injectLogo(){ const el=document.getElementById("hdr-logo"); if(el) el.innerHTML=logoSVG(42); }
function init(){
  ST.athletes = ld("cba_athletes", DA);
  ST.fights = ld("cba_fights", DF);
  ST.lang = ld("cba_lang", "es");
  let sess = ld("cba_session", null);
  if(sess && sess.isCoach){ ST.isCoach=true; launchApp(); }
  else if(sess && sess.userId){ let u = ST.athletes.find(a=>a.id===sess.userId); if(u) loginAthlete(u); else showLogin(); }
  else showLogin();
}
window.addEventListener("DOMContentLoaded", init);
</script>
</body>
